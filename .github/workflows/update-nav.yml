# Updates investment fund NAV-based returns via Playwright + investing.com.
# Runs 3 times per day and on every push to main.
#
# Schedule (UTC → Spain):
#   02:00 UTC = 03:00 CET (winter) / 04:00 CEST (summer)
#   10:00 UTC = 11:00 CET (winter) / 12:00 CEST (summer)
#   18:00 UTC = 19:00 CET (winter) / 20:00 CEST (summer)
#
# Required repository secrets:
#   SUPABASE_URL              — e.g. https://xxx.supabase.co
#   SUPABASE_SERVICE_ROLE_KEY — service role key (bypasses RLS)

name: Update investment NAV

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 2 * * *"    # ~03:00 Spain
    - cron: "0 10 * * *"   # ~11:00 Spain
    - cron: "0 18 * * *"   # ~19:00 Spain
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  update-nav:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check secrets are configured
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "SUPABASE_URL or SUPABASE_SERVICE_ROLE_KEY not configured — skipping NAV update"
            echo "SECRETS_OK=false" >> $GITHUB_ENV
          else
            echo "Secrets OK"
            echo "SECRETS_OK=true" >> $GITHUB_ENV
          fi

      - name: Checkout repository
        if: env.SECRETS_OK == 'true'
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: env.SECRETS_OK == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        if: env.SECRETS_OK == 'true'
        run: npm ci

      - name: Cache Playwright Chromium
        if: env.SECRETS_OK == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        if: env.SECRETS_OK == 'true'
        run: npx playwright install chromium --with-deps

      - name: Update NAV
        if: env.SECRETS_OK == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/update-nav-playwright.mjs