# Updates investment fund NAV-based returns 3 times per day.
#
# Schedule (UTC → Spain):
#   02:00 UTC = 03:00 CET (winter) / 04:00 CEST (summer)
#   10:00 UTC = 11:00 CET (winter) / 12:00 CEST (summer)
#   18:00 UTC = 19:00 CET (winter) / 20:00 CEST (summer)
#
# No duplicate-cron risk: GitHub Actions reads this file on every push
# and replaces the schedule automatically. No manual cleanup needed.
#
# Required repository secrets:
#   APP_URL    - e.g. https://your-app.vercel.app
#   CRON_SECRET - same value as CRON_SECRET env var in your deployment

name: Update investment NAV

on:
  push:       # <--- Añade esto para que se dispare al subir código
    branches:
      - main
  schedule:
    - cron: "0 2 * * *"   # ~03:00 Spain
    - cron: "0 10 * * *"   # ~11:00 Spain
    - cron: "0 18 * * *"  # ~19:00 Spain
  workflow_dispatch:       # allow manual trigger from GitHub UI

jobs:
  update-nav:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check secrets are configured
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "APP_URL or CRON_SECRET not configured — skipping NAV update"
            exit 0
          fi
          echo "Secrets OK"

      - name: Wait for Vercel deployment (push only)
        if: github.event_name == 'push'
        run: |
          echo "Waiting 3 minutes for Vercel to finish deploying..."
          sleep 180

      - name: Call update-nav cron endpoint
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ] || [ -z "$CRON_SECRET" ]; then
            exit 0
          fi

          STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$APP_URL/api/cron/update-nav")

          echo "HTTP status: $STATUS"
          echo "Response:"
          cat /tmp/response.json

          if [ "$STATUS" != "200" ]; then
            echo "Cron endpoint returned non-200 status"
            exit 1
          fi
